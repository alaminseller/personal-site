<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ── Theme Flash Prevention ── -->
  <script>
    (function() {
      var theme = localStorage.getItem('portfolio-theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <!-- Primary Meta Tags -->
  <title>Alamin Rafi — Website & Digital Services</title>
  <meta name="title" content="Alamin Rafi — Website & Digital Services" />
  <meta name="description"
    content="Modern, affordable websites for businesses. Web design, development, WordPress, UI/UX — all in one place." />
  <meta name="keywords"
    content="Web Developer, Website Design, WordPress, UI/UX, Digital Services, Bangladesh, Alamin Rafi" />
  <meta name="author" content="Alamin Rafi" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://alaminrafi.com/" />
  <meta property="og:title" content="Alamin Rafi — Website & Digital Services" />
  <meta property="og:description"
    content="Modern, affordable websites for businesses. Web design, development, WordPress, UI/UX." />
  <meta property="og:image" content="https://alaminrafi.com/5.png" />
  <meta property="og:image:alt" content="Alamin Rafi - Digital Service Provider" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Alamin Rafi" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://alaminrafi.com/" />
  <meta property="twitter:title" content="Alamin Rafi — Website & Digital Services" />
  <meta property="twitter:description"
    content="Modern, affordable websites for businesses. Web design, development, WordPress, UI/UX." />
  <meta property="twitter:image" content="https://alaminrafi.com/5.png" />
  <meta property="twitter:image:alt" content="Alamin Rafi - Digital Service Provider" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://alaminrafi.com" />

  <!-- Performance: hero image is the initial LCP candidate -->
  <link rel="preload" as="image" href="/5.png" />

  <!-- ── PWA: Manifest ── -->
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- ── PWA: Theme & Status Bar ── -->
  <meta name="theme-color" content="#7c3aed" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- ── PWA: iOS specific ── -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Alamin Rafi" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <!-- ── PWA: MS Tile ── -->
  <meta name="msapplication-TileColor" content="#7c3aed" />
  <meta name="msapplication-TileImage" content="/icon-192.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Alamin Rafi",
      "url": "https://alaminrafi.com/",
      "jobTitle": "Digital Service Provider",
      "description": "Modern, affordable websites for businesses. Web design, development, WordPress, and UI/UX services.",
      "image": "https://alaminrafi.com/5.png"
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Alamin Rafi",
      "url": "https://alaminrafi.com/",
      "description": "Portfolio and digital services website for Alamin Rafi."
    }
  </script>

  <!-- ── PWA: Safe Area CSS for notched phones ── -->
  <style>
    :root {
      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
    }
    body {
      /* Prevent rubber-band overscroll on iOS */
      overscroll-behavior: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- ── PWA: Service Worker Registration ── -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/sw.js', { scope: '/' })
          .then(reg => console.log('[PWA] SW registered:', reg.scope))
          .catch(err => console.warn('[PWA] SW registration failed:', err));
      });
    }
  </script>
</body>

</html>
